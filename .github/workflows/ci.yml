name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          GITHUB_PAT: ""
          GITLAB_PAT: ""
          JIRA_API_TOKEN: ""
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt || true

      - name: Verify no secrets in tracked files
        run: |
          if grep -rn "ghp_[A-Za-z0-9]\{36\}" --include="*.py" --include="*.html" --include="*.sh" .; then
            echo "ERROR: Possible GitHub token found in source files"
            exit 1
          fi
          if grep -rn "sk-ant-[A-Za-z0-9]" --include="*.py" --include="*.html" --include="*.sh" .; then
            echo "ERROR: Possible Anthropic key found in source files"
            exit 1
          fi

  e2e:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build container
        run: podman build -t workstream:e2e -f Containerfile .

      - name: Start with real tokens
        env:
          GITHUB_PAT: ${{ secrets.E2E_GITHUB_PAT }}
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "E2E_GITHUB_PAT secret not configured — skipping"
            exit 0
          fi
          podman run -d --name workstream-e2e \
            -p 8080:8080 \
            -e GITHUB_PAT="$GITHUB_PAT" \
            -e POLL_INTERVAL=999999 \
            workstream:e2e

      - name: Wait for startup
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:8080/api/health; then
              echo " startup ok"
              exit 0
            fi
            sleep 5
          done
          echo "Startup failed"
          podman logs workstream-e2e 2>&1 || true
          exit 1

      - name: Verify health endpoint
        run: |
          resp=$(curl -sf http://localhost:8080/api/health)
          echo "$resp" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"

      - name: Verify index page
        run: curl -sf http://localhost:8080/ | grep -q '<html'

      - name: Verify my-prs returns JSON array
        run: |
          resp=$(curl -sf http://localhost:8080/api/my-prs)
          echo "$resp" | python3 -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d,list)"

      - name: Cleanup
        if: always()
        run: podman rm -f workstream-e2e || true

  container:
    name: Container Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: podman build -t workstream:test -f Containerfile .

      - name: Start container
        run: |
          podman run -d --name workstream-test \
            -p 8080:8080 \
            -e GITHUB_PAT="" \
            -e POLL_INTERVAL=999999 \
            workstream:test

      - name: Wait for startup
        run: sleep 5

      - name: Smoke test health endpoint
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/api/health; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          echo "Health check failed after 5 attempts"
          podman logs workstream-test
          exit 1

      - name: Smoke test index page
        run: curl -sf http://localhost:8080/ | head -5

      - name: Stop container
        if: always()
        run: podman rm -f workstream-test || true

      - name: Push to Quay (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          if [ -n "$QUAY_USERNAME" ] && [ -n "$QUAY_PASSWORD" ]; then
            podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
            podman tag workstream:test quay.io/happybhati/workstream:latest
            podman push quay.io/happybhati/workstream:latest
          else
            echo "Quay credentials not configured — skipping push"
          fi
