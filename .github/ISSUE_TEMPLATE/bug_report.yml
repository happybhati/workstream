name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger this bug?
      placeholder: |
        1. Open the dashboard
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.3, Ubuntu 24.04, etc."
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or log output. Check `workstream logs`.
      render: shell
